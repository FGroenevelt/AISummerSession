<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KplusV AI Summer Session — intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#0079AE; --lavender:#B0A9CE; --purple:#8E61A2; --indigo:#545DA4; --ink:#1f2433;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:#11131a; overflow:hidden;}
  /* 16:9 podium, geschaald naar het venster */
  .stage{
    position:fixed; inset:0; display:grid; place-items:center;
    font-family:Inter,system-ui,sans-serif; color:#fff;
  }
  .frame{
    position:relative; width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    overflow:hidden; background:
      radial-gradient(120% 120% at 80% 10%, rgba(0,121,174,.55), transparent 60%),
      radial-gradient(120% 120% at 10% 90%, rgba(142,97,162,.55), transparent 55%),
      linear-gradient(135deg, #3a3f73 0%, #545DA4 35%, #8E61A2 75%, #0079AE 120%);
  }
  /* Bewegende diagonale strepen — echo van het logo */
  .stripes{
    position:absolute; inset:-20%; opacity:.10; mix-blend-mode:screen;
    background:repeating-linear-gradient(-60deg,
      #fff 0 2px, transparent 2px 46px);
  }
  .stripes.b{opacity:.07; background:repeating-linear-gradient(-60deg,
      var(--lavender) 0 6px, transparent 6px 64px);}
  .vignette{position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(10,12,20,.45));}

  /* Logo */
  .logo-wrap{position:absolute; inset:0; display:grid; place-items:center; z-index:5;}
  .logo-wrap img{width:min(26vh,300px); border-radius:18px; box-shadow:0 30px 80px rgba(0,0,0,.45);}
  .logo-corner{position:absolute; top:4.2%; left:4.2%; width:min(7vh,74px); border-radius:10px;
    opacity:0; transform:translateY(-12px); transition:opacity .6s, transform .6s; z-index:6;
    box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .logo-corner.show{opacity:1; transform:none;}

  /* Tekstblok */
  .center{position:absolute; inset:0; display:grid; place-items:center; padding:0 8%; text-align:center; z-index:4;}
  .line{font-weight:800; line-height:1.06; letter-spacing:-.02em; max-width:86vw;
    font-size:clamp(28px,6.4vw,86px); text-shadow:0 6px 30px rgba(0,0,0,.28);}
  .line.small{font-size:clamp(22px,4.2vw,52px); font-weight:700;}
  .chip{display:inline-block; font-size:clamp(13px,1.8vw,22px); font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; padding:.5em 1.1em; border-radius:999px; margin-bottom:.7em;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35); backdrop-filter:blur(4px);}
  .word{display:inline-block; white-space:pre; opacity:0; will-change:transform,opacity,filter;}
  .w{display:inline-block; will-change:transform,opacity,filter;}
  .word.in{animation:wordIn .6s cubic-bezier(.18,.7,.2,1) forwards;}
  /* Regel-niveau invliegen (mag wel afbreken, i.t.t. .word) */
  .rise{opacity:0; animation:wordIn .6s cubic-bezier(.18,.7,.2,1) both;}
  .out .rise{animation:wordOut .34s ease forwards;}
  .out .word{animation:wordOut .34s ease forwards;}
  @keyframes wordIn{from{opacity:0; transform:translateY(64px) scale(.92); filter:blur(10px);} to{opacity:1; transform:none; filter:blur(0);}}
  @keyframes wordOut{to{opacity:0; transform:translateY(-34px); filter:blur(7px);}}
  .acc{color:var(--lavender);}
  /* AI-pil */
  .ai{color:#fff; background:linear-gradient(120deg,var(--blue),var(--indigo)); padding:.04em .34em;
    border-radius:.28em; box-shadow:0 8px 22px rgba(0,121,174,.45);}
  /* Hook (Precies dát lost AI op.) */
  .hook .line{font-weight:900; font-size:clamp(30px,7.2vw,98px);}
  /* CTA */
  .cta .line{font-weight:900;}
  .cta .sub{margin-top:.5em; font-size:clamp(15px,2.4vw,28px); font-weight:600; color:var(--lavender);}

  /* Outro-kaart */
  .outro{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5em; z-index:7; text-align:center; padding:0 6%;}
  .outro img{width:min(18vh,180px); border-radius:16px; box-shadow:0 24px 70px rgba(0,0,0,.5);}
  .outro .t1{font-weight:900; font-size:clamp(23px,4.4vw,56px); max-width:22ch; line-height:1.08;}
  .outro .t2{font-weight:700; font-size:clamp(16px,2.6vw,30px); color:var(--lavender);}
  .outro .url{margin-top:.3em; font-weight:700; font-size:clamp(14px,2.1vw,24px);
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.3); padding:.45em 1em; border-radius:999px;}

  .progress{position:absolute; left:0; bottom:0; height:5px; width:0%; z-index:9;
    background:linear-gradient(90deg,var(--blue),var(--purple),var(--lavender));}
  .replay{position:absolute; right:4%; bottom:6%; z-index:10; opacity:0; transition:opacity .4s;
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4); color:#fff;
    font-family:Inter; font-weight:700; padding:.6em 1.1em; border-radius:999px; cursor:pointer;}
  .replay.show{opacity:1;}
</style>
</head>
<body>
<div class="stage">
  <div class="frame" id="frame">
    <div class="stripes"></div>
    <div class="stripes b"></div>
    <img class="logo-corner" id="logoCorner" src="/logo-kplusv.webp" alt="" />
    <div class="center" id="center"></div>
    <div class="vignette"></div>
    <div class="progress" id="prog"></div>
    <button class="replay" id="replay" onclick="play()">↻ Opnieuw</button>
  </div>
</div>

<script>
const ACCENT = new Set(["vakmanschap","kennis","netwerk","sneller","inhoud","jij","jóuw","oplossing"]);

// Volledig script, 1-op-1 (geen voice-over; tekst-in-beeld op muziek).
// type: 'logo' | 'line' | 'cta' | 'outro'
const beats = [
  // Intro
  { type:'logo', text:"Op 13 augustus organiseren we de KplusV AI Summer Session.", dur:3400 },
  { type:'line', small:true, text:"Samen ontdekken we hoe AI jouw werk makkelijker maakt.", dur:2800 },

  // Herkenning
  { type:'line', small:true, text:"Als adviseur werk je aan adviezen, evaluaties en verkenningen.", dur:3000 },
  { type:'line', small:true, text:"Jouw kracht zit in kennis, netwerk en vakmanschap.", dur:2700 },
  { type:'line', text:"Dat maakt het verschil — en dat blijft zo.", dur:2400 },
  { type:'line', small:true, text:"Maar schrijven, onderzoeken, en repetitief werk?", dur:2400 },
  { type:'line', text:"Dat kan vaak sneller. Precies daar helpt AI.", dur:2500 },

  // Voorbeeld 1: Bidmanagement
  { type:'line', chip:"Bidmanagement", small:true, text:"Doe razendsnel onderzoek naar een uitvraag.", dur:2500 },
  { type:'line', small:true, text:"Laat AI een eerste aanzet maken voor je vragenlijst.", dur:2800 },

  // Voorbeeld 2: Interviews
  { type:'line', chip:"Interviews", small:true, text:"Zet je Teams-interviews automatisch om in een gespreksverslag.", dur:3000 },
  { type:'line', small:true, text:"Laat AI alles samenvatten — met een eerste analyse erbij.", dur:2900 },

  // Voorbeeld 3: Financieel DD
  { type:'line', chip:"Financieel DD", small:true, text:"Geen uren meer bouwen aan een financieel model.", dur:2600 },
  { type:'line', small:true, text:"Geef de parameters mee, AI bouwt de scenario's.", dur:2600 },

  // Boodschap
  { type:'line', small:true, text:"Van businesscase tot beleidsverkenning:", dur:2200 },
  { type:'line', small:true, text:"minder routinewerk, meer tijd voor inhoud.", dur:2400 },
  { type:'line', text:"AI vervangt jouw vakmanschap niet —", dur:2300 },
  { type:'line', text:"het neemt het werk eromheen over.", dur:2300 },

  // Oproep
  { type:'line', text:"En nu ben jij aan zet.", dur:1900 },
  { type:'line', small:true, text:"Welke tool, welk dashboard, welke automatisering zou jij willen ontwikkelen?", dur:3300 },
  { type:'cta', text:"Dien je idee in.", dur:2100 },
  { type:'outro', text:"Misschien bouwen we op 13 augustus wel jóuw oplossing.", dur:4200 },
];

// ── Deterministische, seekbare tijdlijn ─────────────────────────────
// Elke frame is een zuivere functie van de tijd t (ms): seek(t). Geen CSS-
// animaties of timers → perfect voor frame-voor-frame renderen met Puppeteer.
let _acc=0; for(const b of beats){ b._start=_acc; _acc+=b.dur; }
const TOTAL=_acc;
const center=document.getElementById('center');
const logoCorner=document.getElementById('logoCorner');
const prog=document.getElementById('prog');
const replay=document.getElementById('replay');
const stripeEls=document.querySelectorAll('.stripes');

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease=p=>1-Math.pow(1-clamp(p,0,1),3);   // easeOutCubic
const el=t=>document.createElement(t);

function makeWords(container, text, base, ns){
  const parts=text.split(' ');
  parts.forEach((w,i)=>{
    const span=el('span'); span.className='w';
    const m=w.match(/^AI([.,?:—]?)$/);
    if(m){ span.innerHTML=`<span class="ai">AI</span>${m[1]||''}`; }
    else if(ACCENT.has(w.replace(/[.,?:—]/g,'').toLowerCase())){ span.innerHTML=`<span class="acc">${w}</span>`; }
    else { span.textContent=w; }
    container.appendChild(span);
    if(i<parts.length-1) container.appendChild(document.createTextNode(' '));
    ns.push({el:span, delay: base + i*55});
  });
}

function buildBeat(b){
  const ns=[];
  center.className='center'+(b.type==='hook'?' hook':b.type==='cta'?' cta':'');
  center.innerHTML='';
  if(b.type==='logo'){
    const wrap=el('div'); wrap.style.cssText='display:grid;justify-items:center;gap:.7em';
    const img=el('img'); img.src='/logo-kplusv.webp';
    img.style.cssText='width:min(22vh,240px);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.45)';
    wrap.appendChild(img); ns.push({el:img,delay:0});
    const line=el('div'); line.className='line small'; makeWords(line,b.text,350,ns);
    wrap.appendChild(line); center.appendChild(wrap);
  } else if(b.type==='outro'){
    const o=el('div'); o.className='outro';
    const img=el('img'); img.src='/logo-kplusv.webp'; o.appendChild(img); ns.push({el:img,delay:0});
    const t1=el('div'); t1.className='t1'; t1.textContent=b.text; o.appendChild(t1); ns.push({el:t1,delay:200});
    center.appendChild(o);
  } else {
    let base=20;
    if(b.chip){ const c=el('div'); c.className='chip'; c.textContent=b.chip; center.appendChild(c); ns.push({el:c,delay:0}); base=150; }
    const line=el('div'); line.className='line'+(b.small?' small':''); makeWords(line,b.text,base,ns);
    center.appendChild(line);
    if(b.sub){ const s=el('div'); s.className='sub'; s.textContent=b.sub;
      center.appendChild(s); ns.push({el:s, delay: base + b.text.split(' ').length*55 + 120}); }
  }
  for(const n of ns){ n.el.style.opacity='0'; n.el.style.willChange='transform,opacity,filter'; }
  return ns;
}

let built=-1, nodes=[];
function applyNode(n, lt, dur){
  const exitStart=dur-360;
  if(lt>=exitStart){
    const q=ease((lt-exitStart)/340);
    n.el.style.opacity=(1-q);
    n.el.style.filter=`blur(${q*7}px)`;
    n.el.style.transform=`translateY(${-q*34}px)`;
  } else {
    const p=ease((lt-n.delay)/600);
    n.el.style.opacity=p;
    n.el.style.filter=`blur(${(1-p)*10}px)`;
    n.el.style.transform=`translateY(${(1-p)*60}px) scale(${0.92+0.08*p})`;
  }
}

function seek(t){
  t=clamp(t,0,TOTAL-1);
  let i=beats.length-1;
  for(let k=0;k<beats.length;k++){ if(t<beats[k]._start+beats[k].dur){ i=k; break; } }
  const b=beats[i];
  if(i!==built){ nodes=buildBeat(b); built=i;
    logoCorner.classList.toggle('show', !(b.type==='logo'||b.type==='outro')); }
  const lt=t-b._start;
  for(const n of nodes) applyNode(n, lt, b.dur);
  if(stripeEls[0]) stripeEls[0].style.transform=`translateX(${(t/14000*64)%64}px)`;
  if(stripeEls[1]) stripeEls[1].style.transform=`translateX(${(t/22000*64)%64}px)`;
  prog.style.width=(t/TOTAL*100)+'%';
}
window.seek=seek; window.TOTAL=TOTAL;   // voor Puppeteer-render

let raf=0, startT=0;
function play(){
  cancelAnimationFrame(raf); replay.classList.remove('show'); built=-1;
  startT=performance.now();
  const loop=()=>{
    const t=performance.now()-startT;
    seek(t);
    if(t<TOTAL) raf=requestAnimationFrame(loop);
    else replay.classList.add('show');
  };
  raf=requestAnimationFrame(loop);
}

window.addEventListener('load', ()=>{
  const p=new URLSearchParams(location.search);
  if(p.has('render')){ seek(0); window.__ready=true; }            // Puppeteer stuurt seek()
  else if(p.has('beat')){                                          // statische review
    const n=clamp(+p.get('beat'),0,beats.length-1);
    seek(beats[n]._start + Math.min(beats[n].dur-380, 1000));
  } else setTimeout(play,250);
});
</script>
</body>
</html>
